upstream backend {
    server backend:8000;
}

# HTTP : redirection HTTPS + ACME challenge pour certbot
server {
    listen 80;
    server_name stac-wiw.kbaddour.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name stac-wiw.kbaddour.fr;

    ssl_certificate     /etc/letsencrypt/live/stac-wiw.kbaddour.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stac-wiw.kbaddour.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── Routes backend FastAPI ──────────────────────────────────────────────

    location /items {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /catalogue {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pour les gros assets (COG / GeoTIFF)
        proxy_read_timeout    300;
        proxy_send_timeout    300;
        client_max_body_size  200M;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend React SPA (catch-all) ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
